<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">几维鸟与橘猫自行车赛</title>
  <desc id="desc">一只几维鸟和一只橘猫骑自行车在赛道上比赛，包含动态动画效果。</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9bd7ff"/>
      <stop offset="100%" stop-color="#dff4ff"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fd66c"/>
      <stop offset="100%" stop-color="#4fa847"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff7a8"/>
      <stop offset="100%" stop-color="#ffc83d"/>
    </radialGradient>

    <g id="wheel">
      <circle cx="0" cy="0" r="38" fill="#1f1f1f"/>
      <circle cx="0" cy="0" r="31" fill="#f2f2f2"/>
      <circle cx="0" cy="0" r="5" fill="#7a7a7a"/>
      <g stroke="#999" stroke-width="2">
        <line x1="0" y1="0" x2="0" y2="-30"/>
        <line x1="0" y1="0" x2="21" y2="-21"/>
        <line x1="0" y1="0" x2="30" y2="0"/>
        <line x1="0" y1="0" x2="21" y2="21"/>
        <line x1="0" y1="0" x2="0" y2="30"/>
        <line x1="0" y1="0" x2="-21" y2="21"/>
        <line x1="0" y1="0" x2="-30" y2="0"/>
        <line x1="0" y1="0" x2="-21" y2="-21"/>
      </g>
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 0 0" to="360 0 0" dur="0.7s" repeatCount="indefinite"/>
    </g>

    <g id="bikeFrame" stroke="#2b2b2b" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="0" y1="0" x2="75" y2="-45"/>
      <line x1="75" y1="-45" x2="145" y2="0"/>
      <line x1="0" y1="0" x2="145" y2="0"/>
      <line x1="75" y1="-45" x2="92" y2="-90"/>
      <line x1="92" y1="-90" x2="132" y2="-90"/>
      <line x1="145" y1="0" x2="170" y2="-55"/>
      <line x1="170" y1="-55" x2="197" y2="-62"/>
      <circle cx="75" cy="-45" r="8" fill="#444"/>
    </g>

    <path id="racePath" d="M -180 0 C 250 -80, 520 80, 830 -20 S 1340 -60, 1560 0" fill="none"/>
  </defs>

  <rect width="1200" height="700" fill="url(#sky)"/>
  <circle cx="1060" cy="110" r="65" fill="url(#sun)">
    <animate attributeName="cy" values="110;95;110" dur="6s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.9" fill="#ffffff">
    <ellipse cx="210" cy="120" rx="80" ry="32"/>
    <ellipse cx="290" cy="120" rx="65" ry="28"/>
    <ellipse cx="250" cy="95" rx="70" ry="30"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;45 0;0 0" dur="14s" repeatCount="indefinite"/>
  </g>

  <rect y="420" width="1200" height="280" fill="url(#grass)"/>

  <g>
    <ellipse cx="600" cy="520" rx="520" ry="120" fill="#5d5d5d"/>
    <ellipse cx="600" cy="520" rx="400" ry="85" fill="#7b7b7b"/>
    <ellipse cx="600" cy="520" rx="520" ry="120" fill="none" stroke="#ececec" stroke-width="8" stroke-dasharray="26 18"/>
    <ellipse cx="600" cy="520" rx="400" ry="85" fill="none" stroke="#f6f6f6" stroke-width="6" stroke-dasharray="22 16"/>
  </g>

  <g>
    <rect x="98" y="370" width="18" height="80" fill="#f4f4f4"/>
    <rect x="112" y="370" width="120" height="58" rx="6" fill="#e54848"/>
    <text x="172" y="406" text-anchor="middle" font-size="28" font-family="Arial, 'Microsoft YaHei', sans-serif" fill="#fff">START</text>

    <rect x="1080" y="330" width="18" height="120" fill="#f4f4f4"/>
    <rect x="960" y="330" width="120" height="58" rx="6" fill="#3f7cff"/>
    <text x="1020" y="366" text-anchor="middle" font-size="28" font-family="Arial, 'Microsoft YaHei', sans-serif" fill="#fff">FINISH</text>
  </g>

  <!-- Kiwi cyclist -->
  <g>
    <g transform="translate(0 0)">
      <use href="#wheel" x="0" y="0"/>
      <use href="#wheel" x="145" y="0"/>
      <use href="#bikeFrame" x="0" y="0"/>

      <g transform="translate(83 -115)">
        <ellipse cx="0" cy="0" rx="40" ry="50" fill="#7d5b43"/>
        <ellipse cx="24" cy="-8" rx="22" ry="18" fill="#8a644a"/>
        <circle cx="30" cy="-13" r="4" fill="#1a1a1a"/>
        <path d="M 42 -7 Q 68 -1 44 8" fill="#f4b43b"/>
        <ellipse cx="-18" cy="-48" rx="15" ry="11" fill="#6a4c38"/>
      </g>

      <g stroke="#6a4c38" stroke-width="7" stroke-linecap="round" fill="none">
        <line x1="78" y1="-96" x2="93" y2="-58"/>
        <line x1="100" y1="-98" x2="164" y2="-64"/>
      </g>

      <g stroke="#6a4c38" stroke-width="8" stroke-linecap="round" fill="none">
        <line x1="92" y1="-66" x2="64" y2="-20">
          <animate attributeName="y2" values="-20;-5;-20" dur="0.7s" repeatCount="indefinite"/>
        </line>
        <line x1="108" y1="-62" x2="124" y2="-20">
          <animate attributeName="y2" values="-5;-20;-5" dur="0.7s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>

    <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
      <mpath href="#racePath"/>
    </animateMotion>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="0.5s" repeatCount="indefinite"/>
  </g>

  <!-- Orange cat cyclist -->
  <g>
    <g transform="translate(0 0)">
      <use href="#wheel" x="0" y="0"/>
      <use href="#wheel" x="145" y="0"/>
      <use href="#bikeFrame" x="0" y="0"/>

      <g transform="translate(82 -125)">
        <ellipse cx="0" cy="0" rx="46" ry="44" fill="#f7942e"/>
        <circle cx="25" cy="-4" r="24" fill="#ffa13f"/>
        <polygon points="8,-26 16,-48 26,-25" fill="#f18827"/>
        <polygon points="30,-24 41,-47 47,-21" fill="#f18827"/>
        <circle cx="18" cy="-8" r="3.5" fill="#1f1f1f"/>
        <circle cx="33" cy="-7" r="3.5" fill="#1f1f1f"/>
        <path d="M 24 2 Q 27 8 30 2" stroke="#7a3f18" stroke-width="2.5" fill="none"/>
        <path d="M 46 -5 Q 70 8 54 23" stroke="#f18827" stroke-width="8" fill="none" stroke-linecap="round"/>
      </g>

      <g stroke="#f18827" stroke-width="7" stroke-linecap="round" fill="none">
        <line x1="81" y1="-108" x2="95" y2="-61"/>
        <line x1="107" y1="-110" x2="170" y2="-66"/>
      </g>

      <g stroke="#f18827" stroke-width="8" stroke-linecap="round" fill="none">
        <line x1="95" y1="-67" x2="66" y2="-22">
          <animate attributeName="y2" values="-22;-8;-22" dur="0.65s" repeatCount="indefinite"/>
        </line>
        <line x1="112" y1="-63" x2="126" y2="-18">
          <animate attributeName="y2" values="-8;-22;-8" dur="0.65s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>

    <animateMotion dur="7.2s" repeatCount="indefinite" rotate="auto" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#racePath"/>
    </animateMotion>
    <animateTransform attributeName="transform" type="translate" values="0 8;0 2;0 8" dur="0.45s" repeatCount="indefinite"/>
  </g>

  <text x="600" y="92" text-anchor="middle" font-size="52" font-weight="700"
    font-family="Arial, 'Microsoft YaHei', sans-serif" fill="#1d3557">Kiwi 🥝 VS 橘猫 🐈 自行车大赛</text>
</svg>
